# Tutorial harness checks — the sidecar that replaces the old `harness:`
# frontmatter block. Keyed by lesson path under src/content/tutorial (the same
# path `node scripts/harness/verify.mjs --list` prints). The value under each
# key is exactly what used to live under `harness:` in a lesson's content.md.
#
# This file lives OUTSIDE src/content on purpose: Astro's content-collection
# schema rejects unknown frontmatter keys, and a `harness:` block there broke
# the production site build (session 4 O32). Here, Astro never sees it.
#
# A lesson with no entry is still built (both _files and _solution must
# compile) and reported BUILD-ONLY. See README.md for the full check vocabulary.

