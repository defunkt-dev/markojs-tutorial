# ---- Part 9: Static Site Generation (marko-run-static template) ----
# _files ships both pages static (counter.html has no island JS);
# _solution makes the counter interactive (counter.html gains its island).
# NOTE: the harness builds each state in isolation (no dev server), so
# `marko-run build` writes to the DEFAULT dist/public/ and we assert there.
# The lesson prose instead builds with `--output dist-static` — only to avoid
# clobbering the live dev-server preview the lesson keeps running (a preview
# concern the harness doesn't have). Same output, different folder.
9-advanced-examples/1-static-site-generation/1-the-static-adapter:
  emit:
    files:
      - dist/public/index.html
      - dist/public/counter.html
  command:
    run: "cat dist/public/counter.html"
    _files:
      absent: "assets/counter"
    _solution:
      contains: "assets/counter"

# ---- Part 9: Server-Sent Events (base marko-run template) ----
# Both states SSR the same "Waiting…" initial state (the EventSource <script>
# is client-only, so it doesn't run on the server). The discriminating check
# is the client bundle: _files (stub) ships no EventSource; _solution does.
# (cat only the built .js, never the .map — the stub's TODO comment names
#  "EventSource" and would false-match a sourcemap.)
9-advanced-examples/2-server-sent-events/1-the-eventsource-api:
  ssr:
    _files: "Waiting for the server"
    _solution: "Waiting for the server"
  command:
    run: "cat dist/public/assets/*.js"
    _files:
      absent: "EventSource"
    _solution:
      contains: "EventSource"

# ---- Part 9: Shared State via a signals store (marko-run-signals template) ----
# Both states SSR the same "Shared count: 0" — the store bridge (count.subscribe
# -> a <let>) is a client-only <script>, so it doesn't run on the server, and the
# _files/_solution difference is entirely client-runtime. No command check: the
# discriminating string "subscribe" is also present in @preact/signals-core's own
# bundled code (stub .js already contains 1), so absent/contains can't separate the
# states. Build (both compile) + ssr (both render) is the automatable coverage; the
# live cross-component sync is the browser-oracle part.
9-advanced-examples/3-shared-state/1-a-signals-store:
  ssr:
    _files: "Shared count"
    _solution: "Shared count"

# ---- Part 9: Client-Side Forms via final-form (marko-run-forms template) ----
# Both states SSR the same empty form ("Sign up"); the do-it task is the
# validate() function (client-only, in the <script>). Discriminate on the
# validation message, which is a literal in _solution's validate and absent
# from the _files stub (cat only .js — comments are stripped there, and the
# stub comment is worded to avoid the literal anyway).
9-advanced-examples/4-forms/1-a-validated-form:
  ssr:
    _files: "Sign up"
    _solution: "Sign up"
  command:
    run: "cat dist/public/assets/*.js"
    _files:
      absent: "Email is required"
    _solution:
      contains: "Email is required"

# ---- Part 9: Client-Side Rendering via .mount() (marko-csr template) ----
# marko-csr is a plain vite + @marko/vite (linked:false) app, NOT marko-run:
# `vite build` emits to dist/ (index.html + assets/), not dist/public/. The app
# is client-rendered (no SSR), so there's no ssr check — the mount is browser-
# oracle. Discriminate on the mount target lookup: _solution's main.js calls
# document.getElementById in App.mount(...); the _files stub doesn't.
9-advanced-examples/5-client-side-rendering/1-the-mount-api:
  emit:
    files:
      - dist/index.html
  command:
    run: "cat dist/assets/*.js"
    _files:
      absent: "getElementById"
    _solution:
      contains: "getElementById"

# ---- Part 9: Dynamic Loading — facade tags (base marko-run template) ----
# The facade makes a heavy impl ALWAYS lazy. Both states SSR the impl's HTML
# (lazy defers only client JS, not server HTML). The discriminator is the
# code-split: _solution (lazy `with { load }`) emits a separate `comments-impl-*.js`
# chunk; _files (eager import) inlines the impl into the main bundle (no such chunk).
# NB must be a marko-run (linked) template — @marko/vite linked:false can't code-split.
9-advanced-examples/6-dynamic-loading/1-facade-tags:
  ssr:
    _files: "Comments"
    _solution: "Comments"
  command:
    run: "ls dist/public/assets/"
    _files:
      absent: "comments-impl"
    _solution:
      contains: "comments-impl"

# ---- Part 9: Client-Side Rendering — the mount handle (marko-csr template) ----
# Second CSR lesson. Provides its OWN index.html (with #rename/#remove buttons)
# overlaying the template's shell. Do-it task = wire those buttons to the mount
# handle (instance.update / instance.destroy) in main.js. CSR, so no ssr check.
# Discriminate on "rename" — a getElementById arg only in _solution's wiring
# (the _files stub only mentions it in a stripped comment; we cat only .js).
9-advanced-examples/5-client-side-rendering/2-the-mount-handle:
  emit:
    files:
      - dist/index.html
  command:
    run: "cat dist/assets/*.js"
    _files:
      absent: "rename"
    _solution:
      contains: "rename"

# ---- Part 5: Content Security Policy — a CSP nonce (base marko-run template) ----
# The middleware sets $global.cspNonce (context IS $global in marko-run), and Marko
# stamps that nonce onto every <script>/<style> it renders. Do-it task = set
# context.cspNonce. Both states SSR the page; _solution's response carries `nonce=`
# on the rendered tags, _files' does not. (ssr boots the dev server + curls /.)
5-marko-run/4-content-security/1-a-csp-nonce:
  ssr:
    _files:
      contains: "Secured with a nonce"
      absent: "nonce="
    _solution:
      contains: "nonce="

# ---- Part 9: Dynamic Loading — loading on demand (base marko-run template) ----
# Do-it = gate a lazy component behind <if>. _files renders <DetailsPanel/> directly
# (SSR'd, present on load); _solution gates it (show=false) so it's absent until the
# button is clicked. Discriminate on SSR presence: _files shows the panel, _solution
# shows the button and NOT the panel. (Content-deferral is observable, unlike facades.)
9-advanced-examples/6-dynamic-loading/2-loading-on-demand:
  ssr:
    _files:
      contains: "Details panel"
    _solution:
      contains: "Show details"
      absent: "Details panel"

# ---- Part 9: Wrapping a JS Library — Rive animation (marko-run-rive template) ----
# Do-it = fill in the wrapper's <script> that starts the @rive-app/canvas runtime.
# Both states SSR the page + canvas. _solution uses the rive runtime (it's bundled,
# ~154kB); _files' stub doesn't, so the runtime tree-shakes out (~2.5kB). Discriminate
# on resizeDrawingSurfaceToCanvas — called in _solution's onLoad (+ runtime bundled),
# absent from _files. Animation itself is browser-oracle (WASM canvas).
9-advanced-examples/7-wrapping-a-js-library/1-a-rive-animation:
  ssr:
    _files: "A Rive animation"
    _solution: "A Rive animation"
  command:
    run: "cat dist/public/assets/*.js"
    _files:
      absent: "resizeDrawingSurfaceToCanvas"
    _solution:
      contains: "resizeDrawingSurfaceToCanvas"

# ---- Part 9: Portals & Events (base marko-run template) ----
# Portal: do-it = the <script> that moves the rendered <div> to document.body
# (or input.target). Both SSR the card (portal gated behind <if>, not rendered).
# Discriminate on getElementById (the target lookup, _solution only; appendChild
# is used by the runtime so it's in both).
9-advanced-examples/8-portals-and-events/1-a-portal:
  ssr:
    _files: "clips its overflow"
    _solution: "clips its overflow"
  command:
    run: "cat dist/public/assets/*.js"
    _files:
      absent: "getElementById"
    _solution:
      contains: "getElementById"

# Subscribe: do-it = the <script> that adds/removes the listener. Both SSR the
# page (subscribe gated behind <if>). Discriminate on removeEventListener —
# _solution's explicit cleanup; Marko uses addEventListener{signal} internally
# so addEventListener is in both, but removeEventListener is _solution-only.
9-advanced-examples/8-portals-and-events/2-event-subscriptions:
  ssr:
    _files: "Pointer X"
    _solution: "Pointer X"
  command:
    run: "cat dist/public/assets/*.js"
    _files:
      absent: "removeEventListener"
    _solution:
      contains: "removeEventListener"

